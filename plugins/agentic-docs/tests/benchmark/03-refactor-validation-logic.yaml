scenario:
  id: "refactor-validation-logic"
  description: "Refactor duplicated validation logic into reusable functions"
  input:
    task_description: "Refactor validation logic that is duplicated across multiple API handlers into reusable validation functions"
    context:
      - "Multiple API handlers have copy-pasted validation code"
      - "Validation logic includes field presence checks, format validation, and business rules"
      - "Code review feedback requested reducing duplication"
  expected_outcomes:
    - id: "identifies-common-validation-patterns"
      description: "Plan identifies common validation patterns to extract"
      assertion: "llm-rubric: The execution plan identifies common validation patterns or logic that can be extracted"

    - id: "proposes-extraction-approach"
      description: "Plan proposes how to extract validation into shared functions or validators"
      assertion: "llm-rubric: The execution plan proposes creating shared validation functions, validator structs, or validation packages"

    - id: "addresses-error-handling"
      description: "Plan addresses consistent error handling across validators"
      assertion: "llm-rubric: The execution plan addresses how validation errors will be handled and returned consistently"

    - id: "includes-refactoring-testing"
      description: "Plan includes testing to ensure refactoring doesn't change behavior"
      assertion: "llm-rubric: The execution plan includes testing strategy to verify the refactored code behaves identically to the original"

    - id: "considers-backward-compatibility"
      description: "Plan considers impact on existing callers"
      assertion: "llm-rubric: The execution plan considers the impact on existing code that calls the validation logic"
