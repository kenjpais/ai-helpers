scenario:
  id: "calibration-003"
  description: "Calibration: LLM-rubric determinism"
  category: "calibration"

  input:
    task_description: "Add input validation to the registration endpoint"
    context:
      - "The registration endpoint accepts username, email, and password"
      - "Currently there is no input validation"

  expected_outcomes:
    - id: "mentions-validation"
      description: "Plan mentions validation"
      assertion: "llm-rubric: The plan discusses input validation or data validation"
      weight: 1.0
      critical: true

    - id: "mentions-fields"
      description: "Plan mentions the fields to validate"
      assertion: "llm-rubric: The plan mentions username, email, or password fields"
      weight: 1.0
      critical: false

  forbidden_outcomes: []

  grounding:
    required_components: []
    forbidden_components: []

  evaluation:
    runs_per_scenario: 1
    pass_threshold: 1.0
    evaluator:
      model: "claude-sonnet-4-6"
      temperature: 0.0
      prompt_version: "v2.1"
