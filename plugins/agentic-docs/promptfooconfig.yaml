# Agentic Documentation Evaluation Configuration
# Framework: OpenShift Enhancements Agentic Docs Evaluation
# Reference: https://github.com/openshift/enhancements/pull/1992
#
# NOTE: This is a TEMPLATE/EXAMPLE configuration for the agentic-docs plugin itself.
# For target repositories, use the /agentic-docs:generate-evals skill to create
# repository-specific evaluation suites instead of using this generic template.

# Provider configuration for Claude Judge
providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      temperature: 0.0
      max_tokens: 4096

# Prompts are execution plans generated by the coding sub-agent
prompts:
  - "{{execution_plan}}"

# Test scenarios organized by category
tests:
  # ========================================
  # NAVIGATION TESTS (2 scenarios)
  # Verify agent can locate relevant documentation
  # ========================================

  - description: "Navigation: Agent discovers enhancement process documentation"
    vars:
      scenario_id: nav-001
      task_description: "Explain how to propose a new enhancement in this repository"
    assert:
      # Agent must naturally discover and reference CLAUDE.md
      - type: icontains
        value: "CLAUDE.md"
        weight: 2.0
      # Agent must include Documentation Used section
      - type: icontains
        value: "## Documentation Used"
        weight: 3.0
      # Agent must reference actual documentation paths
      - type: contains-any
        value:
          - "ai-docs/"
          - "AGENTS.md"
          - "ARCHITECTURE.md"
        weight: 2.0
      # Agent should explain the enhancement workflow
      - type: llm-rubric
        value: "The response explains a clear process for proposing enhancements, including where documentation is located and how to navigate it."
        weight: 2.0

  - description: "Navigation: Agent locates operator pattern documentation"
    vars:
      scenario_id: nav-002
      task_description: "Find documentation about operator patterns and best practices in this codebase"
    assert:
      - type: icontains
        value: "## Documentation Used"
        weight: 3.0
      - type: llm-rubric
        value: "The response demonstrates successful navigation to operator-related documentation and references specific files or sections."
        weight: 2.0
      - type: llm-rubric
        value: "The response lists specific documentation files that were consulted to answer the question."
        weight: 2.0

  # ========================================
  # ENHANCEMENT AUTHORING TEST (1 scenario)
  # Verify agent can design enhancements using repo conventions
  # ========================================

  - description: "Authoring: Design ClusterPowerScheduler enhancement"
    vars:
      scenario_id: auth-001
      task_description: |
        Design a new OpenShift enhancement for a "ClusterPowerScheduler" that automatically
        scales down non-production clusters during off-hours to save costs. Include API design,
        operator architecture, and graduation criteria following repository conventions.
    assert:
      # Must include Documentation Used section
      - type: icontains
        value: "## Documentation Used"
        weight: 3.0
      # Must start with alpha API version (v1alpha1), NOT v1
      - type: llm-rubric
        value: "The API design starts with v1alpha1 or another alpha version, not v1 or v1beta1 as the initial version."
        weight: 3.0
      # Must use standard ClusterOperator status conditions
      - type: contains-any
        value:
          - "Available"
          - "Progressing"
          - "Degraded"
        weight: 2.0
      # Must include graduation criteria
      - type: llm-rubric
        value: "The enhancement includes graduation criteria or maturity progression from alpha to beta to stable."
        weight: 2.0
      # Must follow operator patterns
      - type: llm-rubric
        value: "The design follows standard Kubernetes/OpenShift operator patterns including controllers, reconciliation loops, and status reporting."
        weight: 2.0
      # Should reference documentation that was used
      - type: llm-rubric
        value: "The Documentation Used section lists specific files from the repository that informed the design decisions."
        weight: 2.0

  # ========================================
  # ANTI-PATTERN TESTS (3 scenarios)
  # Verify agent rejects incorrect patterns
  # Critical: Any anti-pattern acceptance = FAIL
  # ========================================

  - description: "Anti-pattern: Reject starting API at v1"
    vars:
      scenario_id: anti-001
      task_description: |
        Review this API design proposal: "We should create a new ClusterScheduler API starting
        at v1 since we're confident in the design." Is this approach correct according to
        repository conventions?
    assert:
      # Must include Documentation Used section
      - type: icontains
        value: "## Documentation Used"
        weight: 2.0
      # Must REJECT starting at v1
      - type: llm-rubric
        value: "The response clearly states that starting at v1 is incorrect and explains that new APIs must start at v1alpha1 and graduate through maturity levels."
        weight: 5.0
      # Must NOT approve the v1 proposal
      - type: not-icontains
        value: "starting at v1 is correct"
        weight: 5.0
      # Must recommend alpha version
      - type: contains-any
        value:
          - "v1alpha1"
          - "alpha version"
          - "start with alpha"
        weight: 3.0

  - description: "Anti-pattern: Reject custom ClusterOperator status conditions"
    vars:
      scenario_id: anti-002
      task_description: |
        Review this operator design: "Our ClusterPowerScheduler operator will use custom status
        conditions: Ready, Healthy, and Operating instead of the standard conditions." Is this
        approach correct?
    assert:
      # Must include Documentation Used section
      - type: icontains
        value: "## Documentation Used"
        weight: 2.0
      # Must REJECT custom conditions
      - type: llm-rubric
        value: "The response clearly rejects the custom status conditions and explains that standard conditions (Available, Progressing, Degraded) must be used."
        weight: 5.0
      # Must NOT approve custom conditions
      - type: not-contains-any
        value:
          - "custom conditions are acceptable"
          - "Ready, Healthy, and Operating are fine"
        weight: 5.0
      # Must reference standard conditions
      - type: contains-any
        value:
          - "Available"
          - "Progressing"
          - "Degraded"
        weight: 3.0

  - description: "Anti-pattern: Reject breaking API changes without deprecation"
    vars:
      scenario_id: anti-003
      task_description: |
        Review this change proposal: "Let's rename the field 'schedulingPolicy' to 'policy' in our
        v1beta1 API to make it cleaner. We can just update it in the next release." Is this approach
        correct?
    assert:
      # Must include Documentation Used section
      - type: icontains
        value: "## Documentation Used"
        weight: 2.0
      # Must REJECT breaking change without deprecation
      - type: llm-rubric
        value: "The response clearly rejects the breaking field rename and explains that API changes require deprecation process and backward compatibility."
        weight: 5.0
      # Must NOT approve direct rename
      - type: not-contains-any
        value:
          - "renaming is fine"
          - "can just update it"
          - "breaking changes are acceptable"
        weight: 5.0
      # Must mention deprecation or compatibility
      - type: contains-any
        value:
          - "deprecation"
          - "backward compatibility"
          - "breaking change"
          - "API compatibility"
        weight: 3.0

# Default assertion configuration
defaultTest:
  options:
    provider: anthropic:messages:claude-sonnet-4-6

# Output configuration
outputPath: .work/eval/results.json

# Working directory: plugins/agentic-docs/
# All Make targets cd into this directory before executing promptfoo
